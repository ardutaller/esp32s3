<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Carga Firmware ESP32 S3 STEAMakers AI</title>

  <style>
    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      overflow-y: auto;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #123047 0%, #0d0f14 45%, #05070b 100%);
      color: #d2e3ff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px 12px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(77,220,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(77,220,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 18s linear infinite;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
    }

    img.logo {
      width: 360px;
      max-width: 80vw;
      margin-bottom: 35px;
      filter: drop-shadow(0 0 18px #4ddcff);
      animation: floatLogo 4s ease-in-out infinite;
    }

    .frame {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
      padding: 42px 55px 70px;
      border-radius: 22px;
      background: rgba(10, 20, 32, 0.72);
      border: 1px solid rgba(77, 220, 255, 0.45);
      box-shadow: 0 0 30px rgba(77, 220, 255, 0.35);
    }

    h1 {
      font-size: clamp(26px, 5vw, 42px);
      color: #e8f7ff;
      text-shadow: 0 0 18px #4ddcff;
    }

    p { font-size: 18px; }

    esp-web-install-button {
      display: block;
      margin: 40px auto 20px;
      filter: drop-shadow(0 0 12px #72faff);
    }

    /* BOTÓN DESCARGA */
    .download-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 30px auto 10px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #0b1a24;
      background: linear-gradient(90deg, #4ddcff, #72faff);
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 0 18px rgba(77,220,255,0.6);
      overflow: hidden;
    }

    .download-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 70%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
      transform: skewX(-25deg);
      animation: scanDownload 3s infinite;
    }

    .download-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(114,250,255,0.9);
    }

    .download-icon {
      position: relative;
      z-index: 1;
      font-size: 18px;
      animation: downloadPulse 1.5s infinite;
    }

    .download-btn span {
      position: relative;
      z-index: 1;
    }

    .download-note {
      font-size: 13px;
      color: #72faff;
      margin-bottom: 20px;
    }

    @keyframes scanDownload {
      0% { left: -120%; }
      100% { left: 130%; }
    }

    @keyframes downloadPulse {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    @keyframes floatLogo {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 40px 40px; }
    }
  </style>
</head>

<body>
  <main class="container">
    <img src="logo.png" class="logo" alt="Logo">

    <div class="frame">
      <h1>Carga Firmware ESP32-S3 STEAMakers AI</h1>

      <p>Conecta tu dispositivo mediante USB y presiona el botón para comenzar la instalación.</p>

      <script type="module" src="https://unpkg.com/esp-web-tools@9/dist/web/install-button.js"></script>
      <esp-web-install-button manifest="manifest.json"></esp-web-install-button>

      <!-- BOTÓN NUEVO -->
      <a href="https://drive.google.com/file/d/1kcNIqc7HvtjqtMm7ZS_FErCn9hLfUuIZ/view?usp=drive_link"
         target="_blank"
         class="download-btn">
        <span class="download-icon">⬇</span>
        <span>Descargar e instalar controlador</span>
      </a>

      <div class="download-note">
        Si no detecta placa, instalar controlador
      </div>

    </div>
  </main>
</body>
</html>
