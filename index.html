<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Carga Firmware ESP32 S3 STEAMakers AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #123047 0%, #0d0f14 45%, #05070b 100%);
      color: #d2e3ff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(77,220,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(77,220,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 18s linear infinite;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 5px
      );
      pointer-events: none;
      opacity: 0.25;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 30px;
    }

    img.logo {
      width: 360px;
      max-width: 80vw;
      margin-bottom: 35px;
      filter: drop-shadow(0 0 18px #4ddcff);
      animation: floatLogo 4s ease-in-out infinite, blinkEyes 6s infinite;
    }

    .frame {
      position: relative;
      max-width: 760px;
      padding: 42px 55px;
      border-radius: 22px;
      background: rgba(10, 20, 32, 0.72);
      border: 1px solid rgba(77, 220, 255, 0.45);
      box-shadow:
        0 0 30px rgba(77, 220, 255, 0.35),
        inset 0 0 30px rgba(77, 220, 255, 0.08);
      backdrop-filter: blur(12px);
      overflow: hidden;
      animation: pulseFrame 4s infinite;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(114,250,255,0.16) 50%,
        transparent 100%
      );
      transform: translateX(-100%);
      animation: scanLight 5s infinite;
    }

    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 7px 16px;
      border: 1px solid rgba(77,220,255,0.5);
      border-radius: 999px;
      color: #72faff;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(77,220,255,0.08);
      box-shadow: 0 0 14px rgba(77,220,255,0.35);
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(26px, 5vw, 42px);
      color: #e8f7ff;
      text-shadow: 0 0 18px #4ddcff;
      animation: pulseGlow 3s infinite;
    }

    p {
      max-width: 620px;
      margin: 12px auto;
      font-size: 18px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .status {
      margin-top: 26px;
      font-size: 14px;
      color: #72faff;
      letter-spacing: 1px;
      opacity: 0.85;
    }

    esp-web-install-button {
      display: inline-block;
      margin-top: 36px;
      transform: scale(1.3);
      animation: pulseButton 2.5s infinite;
      filter: drop-shadow(0 0 12px #72faff);
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 40px 40px; }
    }

    @keyframes scanLight {
      0% { transform: translateX(-100%); }
      45%, 100% { transform: translateX(100%); }
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes blinkEyes {
      0%, 98%, 100% { opacity: 1; }
      99% { opacity: 0.35; }
    }

    @keyframes pulseGlow {
      0%, 100% { text-shadow: 0 0 12px #4ddcff; }
      50% { text-shadow: 0 0 30px #72faff; }
    }

    @keyframes pulseFrame {
      0%, 100% {
        box-shadow:
          0 0 30px rgba(77, 220, 255, 0.35),
          inset 0 0 30px rgba(77, 220, 255, 0.08);
      }
      50% {
        box-shadow:
          0 0 55px rgba(114, 250, 255, 0.65),
          inset 0 0 40px rgba(114, 250, 255, 0.14);
      }
    }

    @keyframes pulseButton {
      0%, 100% { transform: scale(1.3); }
      50% { transform: scale(1.38); }
    }

    @media (max-width: 600px) {
      .frame {
        padding: 32px 24px;
      }

      p {
        font-size: 16px;
      }

      esp-web-install-button {
        transform: scale(1.05);
      }

      @keyframes pulseButton {
        0%, 100% { transform: scale(1.05); }
        50% { transform: scale(1.1); }
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <img src="logo.png" class="logo" alt="Logo">

    <div class="frame">
      <div class="tag">Firmware Upload System</div>

      <h1>Carga Firmware ESP32-S3 STEAMakers AI</h1>

      <p>Conecta tu dispositivo mediante USB y presiona el botón para comenzar la instalación.</p>
      <p>Adaptado por www.franciscojose.es. Basado en ESP Web Tools.</p>

      <div class="status">ESP32-S3 · KS5034 · USB READY</div>

      <script type="module" src="https://unpkg.com/esp-web-tools@9/dist/web/install-button.js"></script>
      <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
    </div>
  </main>
</body>
</html>
