<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Carga Firmware ESP32 S3 STEAMakers AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      overflow-y: auto;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #123047 0%, #0d0f14 45%, #05070b 100%);
      color: #d2e3ff;
      font-family: 'Segoe UI', sans-serif;
      display: block;
      overflow-y: auto;
      overflow-x: hidden;
      text-align: center;
      padding: 30px 12px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding-bottom: 60px;
    }

    img.logo {
      width: 320px;
      max-width: 80vw;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 18px #4ddcff);
    }

    .frame {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 30px 60px;
      border-radius: 22px;
      background: rgba(10, 20, 32, 0.75);
      border: 1px solid rgba(77, 220, 255, 0.45);
      box-shadow:
        0 0 30px rgba(77, 220, 255, 0.35),
        inset 0 0 30px rgba(77, 220, 255, 0.08);
    }

    h1 {
      font-size: clamp(26px, 5vw, 40px);
      margin-bottom: 15px;
      text-shadow: 0 0 18px #4ddcff;
    }

    p {
      font-size: 18px;
      margin: 10px auto;
      max-width: 600px;
    }

    /* 🔥 BOTÓN PERSONALIZADO */
    .flash-btn {
      display: inline-block;
      margin-top: 40px;
      padding: 18px 34px;
      font-size: 20px;
      font-weight: bold;
      color: #001018;
      background: linear-gradient(90deg, #4ddcff, #72faff);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow:
        0 0 18px #4ddcff,
        0 0 30px #72faff;
      transition: all 0.25s ease;
      letter-spacing: 1px;
    }

    .flash-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow:
        0 0 25px #72faff,
        0 0 45px #72faff;
    }

    .flash-btn:active {
      transform: scale(0.98);
      box-shadow:
        0 0 10px #4ddcff;
    }

    .status {
      margin-top: 20px;
      font-size: 14px;
      color: #72faff;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .flash-btn {
        width: 100%;
        font-size: 18px;
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <img src="logo.png" class="logo" alt="Logo">

    <div class="frame">
      <h1>Carga Firmware ESP32-S3</h1>

      <p>Conecta tu dispositivo por USB y pulsa el botón para instalar.</p>

      <div class="status">ESP32-S3 · USB READY</div>

      <!-- Script obligatorio -->
      <script type="module" src="https://unpkg.com/esp-web-tools@9/dist/web/install-button.js"></script>

      <!-- 🔥 BOTÓN GRANDE PERSONALIZADO -->
      <esp-web-install-button manifest="manifest.json">
        <button slot="activate" class="flash-btn">
          🚀 INSTALAR FIRMWARE
        </button>
      </esp-web-install-button>

    </div>
  </main>
</body>
</html>
